<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Arcade</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    font-size:65px;
    margin-top:50px;
}

.subtitle{
    text-align:center;
    color:#888;
    margin-top:15px;
    margin-bottom:60px;
    font-size:28px;
}

.container{
    width:90%;
    max-width:1400px;
    margin:auto;
}

.section{
    margin-bottom:80px;
}

.section h2{
    font-size:40px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:#111;
    border-radius:25px;
    padding:50px 20px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:.3s;
    border:2px solid #222;
}

.card:hover{
    transform:translateY(-10px);
    background:#1d1d1d;
    border-color:#7c3aed;
}

.icon{
    font-size:80px;
}

.name{
    font-size:36px;
    margin-top:20px;
}

.desc{
    color:#888;
    margin-top:15px;
    font-size:24px;
}

</style>
</head>

<body>

<h1>🎮 Math Arcade</h1>

<div class="subtitle">
Play Games • Train Brain
</div>

<div class="container">

<!-- 經典遊戲 -->

<div class="section">

<div class="grid">

<a class="card" href="games/snake/index.html">
<div class="icon">🐍</div>
<div class="name">貪吃蛇</div>
<div class="desc">開始遊玩</div>
</a>

<a class="card" href="games/tictactoe/index.html">
<div class="icon">❌⭕</div>
<div class="name">井字棋</div>
<div class="desc">開始遊玩</div>
</a>

<a class="card" href="games/2048/index.html">
<div class="icon">🔢</div>
<div class="name">2048</div>
<div class="desc">開始遊玩</div>
</a>

<a class="card" href="games/reaction/index.html">
<div class="icon">⚡</div>
<div class="name">反應測試</div>
<div class="desc">開始遊玩</div>
</a>

<a class="card" href="games/whackamole/index.html">
<div class="icon">🎯</div>
<div class="name">打地鼠</div>
<div class="desc">開始遊玩</div>
</a>

<div class="card">
<div class="icon">💣</div>

<div class="desc">Coming Soon</div>
</div>

<div class="card">
<div class="icon">🐦</div>

</div>

</div>

</div>

</div>

<!-- 數學遊戲 -->

<div class="section">

<h2>🧠 數學遊戲</h2>

<div class="grid">

<div class="icon">➕</div>
<div class="name">心算王</div>
<div class="desc">開始遊玩</div>
</a>

<div class="card">
<div class="icon">📐</div>

</div>

<div class="card">
<div class="icon">∫</div>

</div>

</body>
</html>
