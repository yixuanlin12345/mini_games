<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Arcade</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    font-size:65px;
    margin-top:50px;
}

.subtitle{
    text-align:center;
    color:#888;
    margin-top:15px;
    margin-bottom:60px;
    font-size:28px;
}

.container{
    width:90%;
    margin:auto;
}

.section{
    margin-bottom:70px;
}

.section h2{
    margin-bottom:30px;
    font-size:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:#111;
    border-radius:25px;
    padding:50px 20px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
    background:#1d1d1d;
}

.icon{
    font-size:80px;
}

.name{
    font-size:40px;
    margin-top:20px;
}

.desc{
    color:#888;
    margin-top:15px;
    font-size:28px;
}

</style>

</head>
