<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>踩地雷</title>

<style>

body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{
    font-size:60px;
}

.board{
    width:400px;
    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(8,50px);
}

.cell{

    width:50px;

    height:50px;

    border:1px solid #7c3aed;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    background:#111;

    font-size:25px;

}

.cell:hover{

    background:#222;

}

a{

    display:block;

    margin-top:30px;

    color:white;

}

</style>

</head>
<body>

<h1>💣 踩地雷</h1>

<div class="board" id="board">
</div>

<a href="../../index.html">
← 回首頁
</a>

<script>

const board=
document.getElementById(
"board"
);

let mines=[];

while(mines.length<10){

let random=
Math.floor(Math.random()*64);

if(!mines.includes(random)){

mines.push(random);

}

}

for(let i=0;i<64;i++){

let div=
document.createElement("div");

div.className="cell";

div.onclick=()=>clickCell(div,i);

board.appendChild(div);

}

function clickCell(div,index){

if(mines.includes(index)){

div.innerText="💣";

alert("遊戲結束");

location.reload();

}
else{

div.innerText="😀";

div.style.background="#333";

}

}

</script>

</body>
</html>
