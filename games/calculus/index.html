<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>微分挑戰</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
font-size:60px;
}

.question{
margin-top:80px;
font-size:50px;
}

button{

width:300px;

padding:20px;

margin:15px;

font-size:30px;

background:#111;

color:white;

border:2px solid #7c3aed;

cursor:pointer;

}

button:hover{

background:#222;

}

.score{

font-size:30px;

margin-top:40px;

}

a{

display:block;

margin-top:50px;

color:white;

}

</style>

</head>

<body>

<h1>∫ 微分挑戰</h1>

<div class="question" id="question">

</div>

<div id="choices">

</div>

<div class="score">

分數：

<span id="score">

0

</span>

</div>

<a href="../../index.html">

← 回首頁

</a>

<script>

let score=0;

const problems=[

{

question:"d/dx(x³)",

correct:"3x²",

choices:[

"3x²",

"x²",

"2x"

]

},

{

question:"d/dx(x²)",

correct:"2x",

choices:[

"x",

"2x",

"3x"

]

},

{

question:"d/dx(5x)",

correct:"5",

choices:[

"5",

"x",

"1"

]

},

{

question:"d/dx(sin x)",

correct:"cos x",

choices:[

"-sin x",

"cos x",

"tan x"

]

}

];

function newQuestion(){

let p=

problems[

Math.floor(

Math.random()

*problems.length

)

];

document.getElementById(

"question"

).innerText=

p.question;

let html="";

p.choices.forEach(choice=>{

html+=`

<button onclick="check('${choice}','${p.correct}')">

${choice}

</button>

`;

});

document.getElementById(

"choices"

).innerHTML=

html;

}

function check(answer,correct){

if(answer===correct){

score++;

document.getElementById(

"score"

).innerText=

score;

}

newQuestion();

}

newQuestion();

</script>

</body>
</html>
