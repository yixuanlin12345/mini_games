<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>貪吃蛇</title>

<style>

body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1{
    margin-top:30px;
    font-size:60px;
}

canvas{
    background:#111;
    border:3px solid #7c3aed;
    margin-top:30px;
}

.info{
    margin-top:20px;
    font-size:30px;
}

a{
    display:block;
    margin-top:30px;
    color:white;
}

</style>
</head>
<body>

<h1>🐍 貪吃蛇</h1>

<div class="info">
分數：
<span id="score">0</span>
</div>

<canvas
id="game"
width="400"
height="400">
</canvas>

<a href="../../index.html">
← 回首頁
</a>

<script>

const canvas=
document.getElementById("game");

const ctx=
canvas.getContext("2d");

const size=20;

let snake=[
{x:200,y:200}
];

let dx=size;
let dy=0;

let food={
x:100,
y:100
};

let score=0;

document.addEventListener(
"keydown",
changeDirection
);

function changeDirection(e){

if(e.key==="ArrowUp" && dy===0){

dx=0;
dy=-size;

}

if(e.key==="ArrowDown" && dy===0){

dx=0;
dy=size;

}

if(e.key==="ArrowLeft" && dx===0){

dx=-size;
dy=0;

}

if(e.key==="ArrowRight" && dx===0){

dx=size;
dy=0;

}

}

function draw(){

ctx.fillStyle="black";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#7c3aed";

snake.forEach(part=>{

ctx.fillRect(
part.x,
part.y,
size,
size
);

});

ctx.fillStyle="red";

ctx.fillRect(
food.x,
food.y,
size,
size
);

let head={

x:snake[0].x+dx,

y:snake[0].y+dy

};

snake.unshift(head);

if(

head.x===food.x

&&

head.y===food.y

){

score++;

document.getElementById(
"score"
).innerText=score;

food={

x:Math.floor(
Math.random()*20
)*20,

y:Math.floor(
Math.random()*20
)*20

};

}
else{

snake.pop();

}

if(

head.x<0 ||

head.x>=400 ||

head.y<0 ||

head.y>=400 ||

collision()

){

alert(
"遊戲結束！\n分數："+score
);

location.reload();

}

}

function collision(){

for(

let i=1;

i<snake.length;

i++

){

if(

snake[i].x===snake[0].x

&&

snake[i].y===snake[0].y

){

return true;

}

}

return false;

}

setInterval(

draw,

120

);

</script>

</body>
</html>
