<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>反應測試</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:50px;
    font-size:60px;
}

#box{

    width:300px;

    height:300px;

    background:red;

    margin:80px auto;

    border-radius:20px;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:30px;

}

#result{

    font-size:35px;

}

a{

    color:white;

    display:block;

    margin-top:50px;

}

</style>

</head>

<body>

<h1>⚡反應測試</h1>

<div id="box">

等待變綠...

</div>

<div id="result">
</div>

<a href="../../index.html">

← 回首頁

</a>

<script>

let startTime;

const box=
document.getElementById(
"box"
);

setTimeout(()=>{

box.style.background=
"green";

box.innerText=
"快點擊！";

startTime=
Date.now();

},Math.random()*5000+2000);

box.onclick=function(){

if(box.style.background==="green"){

let reaction=

Date.now()-startTime;

document.getElementById(
"result"
).innerText=

"反應時間："

+reaction+

" ms";

box.style.background=
"red";

box.innerText=
"完成";

}

}

</script>

</body>
</html>
