<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>玩家資料</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

.box{

width:600px;

margin:auto;

background:#111;

padding:40px;

border-radius:20px;

border:2px solid #7c3aed;

}

h1{

font-size:60px;

}

.info{

font-size:30px;

margin-top:30px;

}

a{

display:block;

margin-top:50px;

color:white;

}

</style>

</head>

<body>

<h1>👤 玩家資料</h1>

<div class="box">

<div class="info">

等級：

<span id="level">

1

</span>

</div>

<br>

<div class="info">

經驗值：

<span id="xp">

0

</span>

</div>

<br>

<div class="info">

稱號：

<span id="title">

Beginner

</span>

</div>

</div>

<a href="../../index.html">

← 回首頁

</a>

<script>

let xp=
localStorage.getItem("xp") || 0;

let level=
Math.floor(xp/100)+1;

let title="Beginner";

if(level>=5){

title="Student";

}

if(level>=10){

title="Master";

}

if(level>=20){

title="Professor";

}

if(level>=50){

title="Math God";

}

document.getElementById(
"xp"
).innerText=xp;

document.getElementById(
"level"
).innerText=level;

document.getElementById(
"title"
).innerText=title;

</script>

</body>
</html>
