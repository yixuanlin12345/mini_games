<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>心算王</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:50px;
    font-size:60px;
}

#question{
    margin-top:70px;
    font-size:80px;
}

input{
    width:180px;
    padding:20px;
    margin-top:40px;
    font-size:30px;
    text-align:center;
    border:none;
    border-radius:15px;
}

button{
    padding:20px 30px;
    font-size:25px;
    border:none;
    border-radius:15px;
    background:#7c3aed;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#9333ea;
}

#result{
    margin-top:30px;
    font-size:35px;
}

.info{
    margin-top:50px;
    font-size:30px;
}

.back{
    display:inline-block;
    margin-top:50px;
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<h1>➕ 心算王</h1>

<div id="question"></div>

<input
type="number"
id="answer">

<button onclick="checkAnswer()">
送出
</button>

<div id="result"></div>

<div class="info">

<p>
分數：
<span id="score">0</span>
</p>

<br>

<p>
剩餘時間：
<span id="time">60</span>
秒
</p>

<br>

<p>
最高分：
<span id="highscore">0</span>
</p>

</div>

<a class="back" href="../../index.html">
← 回首頁
</a>

<script>

let num1;
let num2;
let correctAnswer;

let score=0;
let time=60;

let highscore=
localStorage.getItem("mathHighScore") || 0;

document.getElementById("highscore").innerText=
highscore;

function newQuestion(){

    num1=Math.floor(Math.random()*20)+1;

    num2=Math.floor(Math.random()*20)+1;

    correctAnswer=num1+num2;

    document.getElementById("question").innerText=
    num1+" + "+num2+" = ?";
}

function checkAnswer(){

    let userAnswer=
    Number(document.getElementById("answer").value);

    if(userAnswer===correctAnswer){

        score++;

        document.getElementById("result").innerText=
        "✔ 正確";

    }
    else{

        document.getElementById("result").innerText=
        "❌ 錯誤";
    }

    document.getElementById("score").innerText=
    score;

    document.getElementById("answer").value="";

    newQuestion();
}

setInterval(function(){

    time--;

    document.getElementById("time").innerText=time;

    if(time<=0){

        if(score>highscore){

            localStorage.setItem(
            "mathHighScore",
            score
            );
        }

        alert(
        "遊戲結束！\n你的分數："+score
        );

        location.reload();
    }

},1000);

newQuestion();

</script>

</body>
</html>
